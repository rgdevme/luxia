version = "1.0"

[commands.code_review]
description = "Review pending changes against main using Qodo Merge."

instructions = """
You are reviewing changes in the agnos monorepo.

This command is read-only: do not modify any files, do not run mutating git
commands (commit, push, checkout, reset, stash, etc.), and do not create or
delete anything in the working tree. Produce review output only.

Read AGENTS.md at the repo root — it is the single, authoritative source of
the project's coding standards. Treat every rule there as non-negotiable and
flag any violation as at least Medium severity. Do not work from a cached or
summarized version of those rules; read the current file each run.

Then run the standard Qodo Merge analysis (security, performance,
maintainability, error handling, test coverage) and produce categorized
feedback with severity levels.
"""

arguments = [
    { name = "target_branch", type = "string", required = false, default = "main", description = "Branch to diff against" },
    { name = "severity_threshold", type = "string", required = false, default = "medium", description = "Min severity to report (low|medium|high|critical)" },
    { name = "focus_areas", type = "string", required = false, description = "Comma-separated: security, performance, maintainability" }
]

tools = ["qodo_merge", "git", "filesystem"]
execution_strategy = "act"
exit_expression = "approved"
