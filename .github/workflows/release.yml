name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for @luxia/agnos."
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Mint release app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          VERSION=$(pnpm version "$BUMP" --no-git-tag-version | tail -1 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Bumped @luxia/agnos to v$VERSION"

      - name: Refresh lockfile after version bump
        run: pnpm install --no-frozen-lockfile

      # lint / format / typecheck / test are gated by ci.yml on every push; a
      # version-only bump can't affect them. The build must still succeed.
      - name: Build
        run: pnpm build

      - name: Publish to npm with provenance
        # NPM_TOKEN is only needed until an OIDC trusted publisher is configured
        # on npmjs.com; afterwards NODE_AUTH_TOKEN can be empty and the npm CLI
        # falls back to the OIDC token exchange.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Commit, tag, and push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: release v$VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh release create "v$VERSION" --generate-notes --title "v$VERSION"
